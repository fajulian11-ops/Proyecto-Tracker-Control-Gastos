<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitBills</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="w-52 bg-white border-r border-gray-100 flex flex-col py-6 flex-shrink-0">

    <!-- Marca -->
    <div class="px-5 pb-5 mb-5 border-b border-gray-100 flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </div>
      <span class="text-sm font-medium text-gray-800">FitBills</span>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col gap-1 px-2">
      <a href="#" data-page="dashboard" class="nav-link active-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-indigo-600 bg-indigo-50 font-medium">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#" data-page="gastos" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Gastos
      </a>
      <a href="#" data-page="categorias" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Categorías
      </a>
      <a href="#" data-page="presupuestos" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Presupuestos
      </a>
    </nav>

    <!-- Footer -->
    <div class="mt-auto px-5 pt-4 border-t border-gray-100 flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-xs font-medium text-indigo-600">FA</div>
      <div>
        <p class="text-sm font-medium text-gray-800">Facundo</p>
        <p class="text-xs text-gray-400">Mi cuenta</p>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main-content" class="flex-1 overflow-auto bg-gray-50 p-6">
    
  </main>







  <!-- SCRIPTS -->
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/gastos.js"></script>
  <script src="js/categorias.js"></script>
  <script src="js/presupuestos.js"></script>
<script>
  function navigate(page) {
    // Limpiar contenido
    document.getElementById("main-content").innerHTML = "";

    // Actualizar link activo en el sidebar
    document.querySelectorAll(".nav-link").forEach(function(link) {
      link.classList.remove("active-link", "text-indigo-600", "bg-indigo-50", "font-medium");
      link.classList.add("text-gray-500");
    });

    let activeLink = document.querySelector(`[data-page="${page}"]`);
    if (activeLink) {
      activeLink.classList.add("active-link", "text-indigo-600", "bg-indigo-50", "font-medium");
      activeLink.classList.remove("text-gray-500");
    }

    // Cargar la página correspondiente
    if (page === "dashboard") renderDashboard();
    if (page === "gastos") renderGastos();
    if (page === "categorias") renderCategorias();
    if (page === "presupuestos") renderPresupuestos();
  }

  // Eventos del sidebar
  document.querySelectorAll(".nav-link").forEach(function(link) {
    link.addEventListener("click", function(e) {
      e.preventDefault();
      navigate(this.dataset.page);
    });
  });

  // Cargar dashboard al inicio
  navigate("dashboard");

</script>

</body>
</html>
